<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Cursor with Besa64</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background: linear-gradient(135deg, #f5f5f5, #e8eefc);
      font-family: Arial, sans-serif;
    }

    #cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 48px;
      height: 48px;
      pointer-events: none;
      transform: translate(-2px, -2px);
      z-index: 9999;
      user-select: none;
      -webkit-user-drag: none;
    }

    .center {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    button {
      padding: 18px 30px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: #1f6feb;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,.15);
      cursor: none;
      transition: transform .15s ease, background .15s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: #1557b0;
    }
  </style>
</head>

  <img id="cursor" alt="cursor" />

    const cursor = document.getElementById("cursor");
    const btn = document.getElementById("hoverBtn");

    cursor.src = normalCursor;

    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
